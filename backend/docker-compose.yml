services:
  db:
    image: postgres:16
    container_name: neto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: neto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
