<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell">
    <main class="auth-wrap">
      <div class="container">
        <div class="auth-card row g-0">
          <div class="col-lg-5 d-none d-lg-block">
            <section class="auth-side h-100 d-flex flex-column justify-content-between">
              <div>
                <a class="brand-lockup text-white" href="index.html">
                  <span class="logo-mark" aria-hidden="true"></span>
                  <span>NETO</span>
                </a>
                <h2 class="mt-4">Bienvenido de nuevo</h2>
                <p class="mb-0">Toma decisiones con una vista clara de tus movimientos y metas.</p>
              </div>
              <ul>
                <li>Dashboard mensual</li>
                <li>OCR de tickets</li>
                <li>Recomendaciones personalizadas</li>
              </ul>
            </section>
          </div>
          <div class="col-lg-7">
            <section class="p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">Iniciar sesion</h1>
                <button class="btn btn-ghost btn-sm" onclick="toggleTheme()">Tema</button>
              </div>
              <p class="text-secondary mb-4">Accede a tu panel financiero para continuar.</p>
              <form id="loginForm" class="d-grid gap-3">
                <div>
                  <label class="form-label">Email</label>
                  <input class="form-control form-control-modern" type="email" name="email" placeholder="tu@email.com" required />
                </div>
                <div>
                  <label class="form-label">Contrasena</label>
                  <input class="form-control form-control-modern" type="password" name="password" placeholder="********" required />
                </div>
                <button class="btn btn-neto" type="submit">Ingresar</button>
              </form>
              <div class="d-flex justify-content-between mt-4 small">
                <a class="text-link" href="register.html">Crear cuenta</a>
                <a class="text-link" href="forgot-password.html">Olvide mi contrasena</a>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
