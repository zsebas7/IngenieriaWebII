<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell d-flex align-items-center" style="min-height: 100vh">
    <main class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="panel-card fade-in-up">
            <h1 class="h3 mb-2">Iniciar sesión</h1>
            <p class="text-secondary mb-3">Volvé a tu panel financiero.</p>
            <form id="loginForm" class="d-grid gap-2">
              <input class="form-control form-control-modern" type="email" name="email" placeholder="Email" required />
              <input class="form-control form-control-modern" type="password" name="password" placeholder="Contraseña" required />
              <button class="btn btn-neto" type="submit">Ingresar</button>
            </form>
            <div class="d-flex justify-content-between mt-3 small">
              <a href="register.html">Crear cuenta</a>
              <a href="forgot-password.html">Olvidé mi contraseña</a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
