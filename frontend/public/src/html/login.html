<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="d-flex align-items-center" style="min-height: 100vh">
    <main class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="feature-card">
            <h2>Iniciar sesión</h2>
            <form id="loginForm" class="mt-3">
              <div class="mb-2"><input class="form-control" type="email" name="email" placeholder="Email" required /></div>
              <div class="mb-3"><input class="form-control" type="password" name="password" placeholder="Contraseña" required /></div>
              <button class="btn btn-neto w-100">Ingresar</button>
            </form>
            <div class="mt-3 d-flex justify-content-between">
              <a href="register.html">Crear cuenta</a>
              <a href="forgot-password.html">Olvidé mi contraseña</a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
