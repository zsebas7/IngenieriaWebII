<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | NETO</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="sc-expenses-page">
    <main class="sc-auth-shell">
      <div class="sc-card sc-auth-card">
        <header class="sc-card-header">
          <h1 class="sc-card-title">Iniciar sesión</h1>
          <p class="sc-card-description">Accede a tu cuenta para revisar dashboard, gastos y recomendaciones.</p>
        </header>
        <div class="sc-card-content">
            <form id="loginForm" class="sc-field-group">
              <div class="sc-field"><input class="sc-input" type="email" name="email" placeholder="Email" required /></div>
              <div class="sc-field"><input class="sc-input" type="password" name="password" placeholder="Contraseña" required /></div>
              <button class="sc-button primary w-100" type="submit">Ingresar</button>
            </form>
            <div class="sc-auth-links mt-3">
              <a href="register.html">Crear cuenta</a>
              <a href="forgot-password.html">Olvidé mi contraseña</a>
            </div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
