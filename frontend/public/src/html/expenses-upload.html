<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subir Ticket | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell with-sidebar">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <p class="eyebrow mb-1">Centro de gastos</p>
          <h1 class="h3 mb-0">Subir ticket</h1>
        </div>
      </div>
    </header>

    <nav class="subnav" data-component="sidebar"></nav>

    <main class="container py-4 py-lg-5 page-main-with-footer-link">
      <section class="panel-card ticket-card mb-3">
        <h5 class="mb-3">Carga tu ticket</h5>
        <form id="ticketUploadForm" class="ticket-upload-form d-flex flex-column gap-2">
          <label for="ticketFile" id="ticketDropzone" class="expenses-ticket-dropzone">
            <strong>Arrastra y suelta tu ticket aquí</strong>
            <small>o haz click para seleccionar (JPG, PNG o PDF)</small>
            <div id="ticketFileName" class="ticket-file-name">Ningun archivo seleccionado</div>
          </label>
          <input id="ticketFile" class="d-none" type="file" accept=".jpg,.jpeg,.png,.pdf" required />
          <button class="btn btn-neto ticket-submit-btn" type="submit">Procesar ticket</button>
        </form>
      </section>

      <section class="panel-card mb-3">
        <h6 class="mb-2">Último ticket confirmado</h6>
        <div id="latestTicketCard" class="planning-list"></div>
      </section>

      <p class="flow-redirect-note mb-0">
        ¿Quieres cargar el gasto de manera manual?
        <a href="expenses.html">Ir a carga manual</a>
        <span class="mx-1">·</span>
        <a href="expenses-organize.html">Organizar gastos</a>
      </p>
    </main>

    <div class="modal fade" id="ticketConfirmModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
      <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content panel-card">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title">Confirmar carga del ticket</h5>
          </div>
          <div class="modal-body pt-2">
            <p class="text-secondary small mb-2">Revisa y corrige los datos extraídos antes de confirmar.</p>
            <div id="ticketPendingSummary" class="empty-state py-2 mb-3">Todavia no hay ticket pendiente de confirmacion.</div>
            <form id="ticketConfirmForm" class="row g-3">
              <div class="col-md-7">
                <label class="form-label">Comercio</label>
                <input class="form-control form-control-modern" name="merchant" required />
              </div>
              <div class="col-md-5">
                <label class="form-label">Fecha</label>
                <div class="input-group calendar-input-group">
                  <input id="confirmExpenseDateInput" class="form-control form-control-modern" type="text" name="expenseDate" placeholder="dd/mm/aaaa" pattern="\d{2}/\d{2}/\d{4}" inputmode="numeric" maxlength="10" data-date-mask="ddmmyyyy" required />
                  <input id="confirmExpenseDatePicker" class="calendar-hidden-input" type="date" tabindex="-1" aria-hidden="true" />
                  <button class="btn btn-outline-secondary date-picker-trigger" type="button" data-target="confirmExpenseDatePicker" data-sync="confirmExpenseDateInput" aria-label="Abrir calendario para fecha de gasto" title="Abrir calendario">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                      <line x1="16" y1="2" x2="16" y2="6"></line>
                      <line x1="8" y1="2" x2="8" y2="6"></line>
                      <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Monto</label>
                <input class="form-control form-control-modern no-spinner" type="number" step="0.01" name="originalAmount" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Moneda</label>
                <select class="form-select form-control-modern" name="currency"><option>ARS</option><option>USD</option><option>EUR</option></select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Categoría</label>
                <select class="form-select form-control-modern" name="category" required>
                  <option value="">Seleccionar</option>
                  <option>Alimentos</option>
                  <option>Entretenimiento</option>
                  <option>Transporte</option>
                  <option>Salud</option>
                  <option>Educación</option>
                  <option>Servicios</option>
                  <option>Hogar</option>
                  <option>Otros</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Descripción</label>
                <input class="form-control form-control-modern" name="description" />
              </div>
              <div class="col-12 d-flex justify-content-end gap-2">
                <button id="cancelTicketConfirmBtn" class="btn btn-outline-secondary" type="button">Cancelar carga</button>
                <button class="btn btn-neto" type="submit">Confirmar carga</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/expenses-helpers.js"></script>
    <script src="../js/expenses-upload.js"></script>
  </body>
</html>
