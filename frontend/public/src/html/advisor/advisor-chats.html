<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chats Abiertos | Asesor | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="app-shell with-sidebar" data-advisor-page="chats">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <div class="d-flex align-items-center gap-2 mb-1">
            <span class="logo-mark" aria-hidden="true" style="width: 28px; height: 28px"></span>
            <p class="eyebrow mb-0">Asesoría financiera</p>
          </div>
          <h1 class="h3 mb-0">Chats abiertos</h1>
        </div>
      </div>
    </header>

    <nav class="subnav" data-component="sidebar"></nav>

    <main class="container py-4 py-lg-5">
      <section class="panel-card">
        <div class="section-title mb-3">
          <h5 class="mb-0">Conversaciones con usuarios</h5>
          <span class="text-secondary">Abra conversaciones y responda en tiempo real</span>
        </div>

        <div class="row g-3 ai-chat-layout">
          <div class="col-lg-4">
            <div class="panel-card h-100 ai-chat-sidebar">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0">Usuarios</h6>
              </div>
              <div id="advisorUsersList" class="planning-list ai-chat-sessions"></div>
              <hr />
              <h6 class="mb-2">Conversaciones abiertas</h6>
              <div id="advisorConversationsList" class="planning-list ai-chat-sessions"></div>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="panel-card h-100 d-flex flex-column gap-3 ai-chat-panel">
              <div class="ai-chat-panel-head">
                <div>
                  <h6 class="mb-1">Conversación activa</h6>
                  <p id="advisorChatTitle" class="mb-0 text-secondary small">Seleccione o abra una conversación</p>
                </div>
                <span id="advisorChatStatus" class="status-chip warn">Sin conexión</span>
              </div>

              <div id="advisorChatMessages" class="planning-list ai-chat-messages" aria-live="polite"></div>

              <form id="advisorChatForm" class="d-flex gap-2 align-items-end">
                <div class="flex-grow-1">
                  <label class="form-label mb-1" for="advisorChatInput">Mensaje</label>
                  <textarea
                    id="advisorChatInput"
                    class="form-control form-control-modern"
                    rows="2"
                    maxlength="2000"
                    placeholder="Escribe una respuesta para el usuario..."
                  ></textarea>
                </div>
                <button id="advisorChatSendBtn" class="btn btn-neto" type="submit">Enviar</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/shared/dom.js"></script>
    <script src="/js/shared/icons.js"></script>
    <script src="/js/shared/format.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/advisor-chats.js"></script>
  </body>
</html>
