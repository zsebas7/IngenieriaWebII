<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar contraseña | NETO</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="sc-expenses-page">
    <main class="sc-auth-shell">
      <div class="sc-card sc-auth-card">
        <header class="sc-card-header">
          <h1 class="sc-card-title">Recuperar contraseña</h1>
          <p class="sc-card-description">Ingresa tu email y te enviaremos instrucciones para restablecer el acceso.</p>
        </header>
        <div class="sc-card-content">
            <form id="forgotPasswordForm" class="sc-field-group">
              <input class="sc-input" type="email" name="email" placeholder="Email" required />
              <button class="sc-button primary w-100" type="submit">Enviar instrucciones</button>
            </form>
            <div class="text-center mt-3"><a href="login.html">Volver a login</a></div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/forgot-password.js"></script>
  </body>
</html>
