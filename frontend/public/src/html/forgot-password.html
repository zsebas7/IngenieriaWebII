<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar contraseña | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell d-flex align-items-center" style="min-height: 100vh">
    <main class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="panel-card fade-in-up">
            <h1 class="h3 mb-2">Recuperar contraseña</h1>
            <p class="text-secondary mb-3">Te enviaremos instrucciones a tu correo.</p>
            <form id="forgotPasswordForm" class="d-grid gap-2">
              <input class="form-control form-control-modern" type="email" name="email" placeholder="Email" required />
              <button class="btn btn-neto" type="submit">Enviar instrucciones</button>
            </form>
            <div class="text-center mt-3 small"><a href="login.html">Volver a login</a></div>
          </div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/forgot-password.js"></script>
  </body>
</html>
