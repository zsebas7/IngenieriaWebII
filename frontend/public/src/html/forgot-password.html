<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar contraseña | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell">
    <main class="auth-wrap">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6">
            <section class="panel-card p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h3 mb-0">Recuperar contraseña</h1>
              </div>
              <p class="text-secondary">Te enviaremos instrucciones al email registrado.</p>
              <form id="forgotPasswordForm" class="d-grid gap-3">
                <input class="form-control form-control-modern" type="email" name="email" placeholder="tu@email.com" required />
                <button class="btn btn-neto" type="submit">Enviar instrucciones</button>
              </form>
              <div class="mt-4 d-flex justify-content-between">
                <a class="text-link" href="login.html">Volver a login</a>
                <a class="text-link" href="index.html">Ir a inicio</a>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/forgot-password.js"></script>
  </body>
</html>
