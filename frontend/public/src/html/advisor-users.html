<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios | Asesor | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell with-sidebar" data-advisor-page="users">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <div class="d-flex align-items-center gap-2 mb-1">
            <span class="logo-mark" aria-hidden="true" style="width: 28px; height: 28px"></span>
            <p class="eyebrow mb-0">Asesoría financiera</p>
          </div>
          <h1 class="h3 mb-0">Usuarios a asesorar</h1>
        </div>
      </div>
    </header>

    <nav class="subnav">
      <div class="container d-flex flex-wrap gap-2 py-2">
        <button id="navToggle" class="subnav-toggle" type="button" aria-expanded="false" aria-label="Mostrar u ocultar etiquetas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>
        <a class="chip" href="advisor.html" data-label="Resumen" title="Resumen" aria-label="Resumen">
          <span class="chip-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h8V3H3zM13 21h8V11h-8zM13 3h8v4h-8zM3 21h8v-6H3z"/></svg>
          </span>
          <span class="chip-label">Resumen</span>
        </a>
        <a class="chip active" href="advisor-users.html" data-label="Usuarios" title="Usuarios" aria-label="Usuarios">
          <span class="chip-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8.5 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <span class="chip-label">Usuarios</span>
        </a>
        <a class="chip" href="advisor-detail.html" data-label="Detalle" title="Detalle" aria-label="Detalle de usuario">
          <span class="chip-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 3h5v5"/><path d="M21 3l-7 7"/></svg>
          </span>
          <span class="chip-label">Detalle</span>
        </a>
        <a class="chip" href="profile.html" data-label="Perfil" title="Perfil" aria-label="Perfil">
          <span class="chip-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 1 0-16 0M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
          </span>
          <span class="chip-label">Perfil</span>
        </a>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <section class="panel-card mb-4 fade-in-up">
        <div class="section-title mb-3">
          <h5 class="mb-0">Usuarios registrados</h5>
          <span class="text-secondary small" id="advisorUsersResultCount">0 resultados</span>
        </div>
        <div class="advisor-filters mb-3">
          <div>
            <label class="form-label mb-1" for="advisorSearchInput">Buscar</label>
            <input id="advisorSearchInput" type="text" class="form-control form-control-modern" placeholder="Nombre o email" />
          </div>
          <div>
            <label class="form-label mb-1" for="advisorRoleFilter">Rol</label>
            <select id="advisorRoleFilter" class="form-select form-control-modern">
              <option value="ALL">Todos</option>
              <option value="USER">USER</option>
              <option value="ADVISOR">ADVISOR</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>
          <div>
            <label class="form-label mb-1" for="advisorStatusFilter">Estado</label>
            <select id="advisorStatusFilter" class="form-select form-control-modern">
              <option value="ALL">Todos</option>
              <option value="ACTIVE">Activos</option>
              <option value="INACTIVE">Inactivos</option>
            </select>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-modern align-middle">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Gastos</th>
                <th>Total ARS</th>
                <th class="text-end">Acción</th>
              </tr>
            </thead>
            <tbody id="advisorUsersBody"></tbody>
          </table>
        </div>
        <div class="advisor-pagination">
          <button class="btn btn-ghost" id="advisorUsersPrev">Anterior</button>
          <span id="advisorUsersPageInfo" class="text-secondary small">Página 1 de 1</span>
          <button class="btn btn-ghost" id="advisorUsersNext">Siguiente</button>
        </div>
      </section>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/advisor.js"></script>
  </body>
</html>
