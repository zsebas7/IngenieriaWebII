<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil | NETO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="sc-expenses-page">
    <header class="sc-topbar">
      <div class="sc-container sc-topbar-inner">
        <div>
          <p class="sc-title-eyebrow">Cuenta</p>
          <h1 class="sc-title">Perfil de usuario</h1>
        </div>
        <div class="sc-actions">
          <button class="sc-button secondary" type="button" onclick="toggleTheme()">Tema</button>
          <button class="sc-button destructive" type="button" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </header>

    <nav class="sc-tabs" aria-label="Secciones de usuario">
      <div class="sc-container sc-tabs-list">
        <a class="sc-tab" href="dashboard.html">Resumen</a>
        <a class="sc-tab" href="expenses.html">Cargar gastos</a>
        <a class="sc-tab" href="stats.html">Estadísticas</a>
        <a class="sc-tab" data-active="true" href="profile.html" aria-current="page">Perfil</a>
      </div>
    </nav>

    <main class="sc-main">
      <div class="sc-container">
      <div class="row g-3">
        <div class="col-lg-4">
          <div class="sc-card h-100">
            <div class="sc-card-content">
            <h5 class="mb-3">Resumen</h5>
            <div class="profile-line"><span>Nombre</span><strong id="profileName">-</strong></div>
            <div class="profile-line"><span>Email</span><strong id="profileEmail">-</strong></div>
            <div class="profile-line"><span>Rol</span><strong id="profileRole">-</strong></div>
            <div class="profile-line"><span>Estado</span><strong id="profileStatus">-</strong></div>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="sc-card">
            <div class="sc-card-content">
            <h5 class="mb-3">Editar preferencias</h5>
            <form id="profileForm" class="sc-field-group">
              <div class="sc-form-grid">
              <div class="sc-field col-6">
                <label class="sc-label">Nombre completo</label>
                <input class="sc-input" name="fullName" required />
              </div>
              <div class="sc-field col-6">
                <label class="sc-label">Idioma</label>
                <select class="sc-select" name="language">
                  <option value="es">Español</option>
                  <option value="en">English</option>
                </select>
              </div>
              <div class="sc-field col-6">
                <label class="sc-label">Moneda preferida</label>
                <select class="sc-select" name="preferredCurrency">
                  <option value="ARS">ARS</option>
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                </select>
              </div>
              </div>
              <div class="sc-row">
                <button class="sc-button primary" type="submit">Guardar cambios</button>
                <a class="sc-button secondary" href="dashboard.html">Volver al resumen</a>
              </div>
            </form>
            </div>
          </div>
        </div>
      </div>
      </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
