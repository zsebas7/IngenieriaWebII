<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell with-sidebar">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <p class="eyebrow mb-1">Cuenta</p>
          <h1 class="h3 mb-0">Perfil y preferencias</h1>
        </div>
      </div>
    </header>

    <nav class="subnav">
      <div class="container d-flex flex-wrap gap-2 py-2">
        <button id="navToggle" class="subnav-toggle" type="button" aria-expanded="false" aria-label="Mostrar u ocultar etiquetas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>
        <a class="chip" href="dashboard.html" data-label="Resumen" title="Resumen" aria-label="Resumen">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h8V3H3zM13 21h8V11h-8zM13 3h8v4h-8zM3 21h8v-6H3z"/></svg></span>
          <span class="chip-label">Resumen</span>
        </a>
        <a class="chip" href="expenses.html" data-label="Cargar Gastos" title="Cargar Gastos" aria-label="Cargar Gastos">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10"/></svg></span>
          <span class="chip-label">Cargar Gastos</span>
        </a>
        <a class="chip" href="planning.html" data-label="Planificación" title="Planificación" aria-label="Planificación">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4v4M16 4v4M4 10h16M6 20h12a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg></span>
          <span class="chip-label">Planificación</span>
        </a>
        <a class="chip" href="stats.html" data-label="Estadísticas" title="Estadísticas" aria-label="Estadísticas">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19h16M7 16V8M12 16V5M17 16v-3"/></svg></span>
          <span class="chip-label">Estadísticas</span>
        </a>
        <a class="chip active" href="profile.html" data-label="Perfil" title="Perfil" aria-label="Perfil">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 1 0-16 0M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg></span>
          <span class="chip-label">Perfil</span>
        </a>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <div class="row g-3">
        <div class="col-lg-4">
          <section class="panel-card h-100">
            <h5 class="mb-3">Resumen de cuenta</h5>
            <div class="profile-line"><span>Nombre</span><strong id="profileName">-</strong></div>
            <div class="profile-line"><span>Email</span><strong id="profileEmail">-</strong></div>
            <div class="profile-line"><span>Rol</span><strong id="profileRole">-</strong></div>
            <div class="profile-line"><span>Estado</span><strong id="profileStatus">-</strong></div>
          </section>
        </div>
        <div class="col-lg-8">
          <section class="panel-card h-100">
            <h5 class="mb-3">Editar preferencias</h5>
            <form id="profileForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre completo</label>
                <input class="form-control form-control-modern" name="fullName" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Idioma</label>
                <select class="form-select form-control-modern" name="language"><option value="es">Español</option><option value="en">English</option></select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Moneda preferida</label>
                <select class="form-select form-control-modern" name="preferredCurrency"><option value="ARS">ARS</option><option value="USD">USD</option><option value="EUR">EUR</option></select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Tema de la aplicación</label>
                <select class="form-select form-control-modern" name="themePreference" id="themePreference">
                  <option value="light">Modo claro</option>
                  <option value="dark">Modo oscuro</option>
                </select>
              </div>
              <div class="col-12 d-flex gap-2 flex-wrap">
                <button class="btn btn-neto" type="submit">Guardar cambios</button>
                <a class="btn btn-outline-secondary" href="dashboard.html">Volver al resumen</a>
              </div>
            </form>

            <hr class="my-4" />

            <h5 class="mb-3">Seguridad</h5>
            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-neto" id="openPasswordModal" type="button" data-bs-toggle="modal" data-bs-target="#changePasswordModal">Cambiar contraseña</button>
              <button class="btn btn-outline-danger" id="logoutFromProfile" type="button">Cerrar sesión</button>
            </div>
          </section>
        </div>
      </div>
    </main>

    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content panel-card">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title">Cambiar contraseña</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body pt-2">
            <form id="passwordForm" class="row g-3">
              <div class="col-12">
                <label class="form-label">Contraseña actual</label>
                <input class="form-control form-control-modern" name="currentPassword" type="password" required />
              </div>
              <div class="col-12">
                <label class="form-label">Nueva contraseña</label>
                <input class="form-control form-control-modern" name="newPassword" type="password" minlength="8" required />
              </div>
              <div class="col-12">
                <label class="form-label">Confirmar nueva contraseña</label>
                <input class="form-control form-control-modern" name="confirmPassword" type="password" minlength="8" required />
              </div>
              <div class="col-12 d-flex justify-content-end gap-2">
                <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-neto" type="submit">Guardar nueva contraseña</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
