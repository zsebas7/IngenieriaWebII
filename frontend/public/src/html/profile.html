<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell">
    <header class="topbar">
      <div class="container py-3 d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <p class="eyebrow mb-1">Cuenta</p>
          <h1 class="h4 mb-0">Perfil de usuario</h1>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-ghost btn-sm" onclick="toggleTheme()">Tema</button>
          <button class="btn btn-outline-danger btn-sm" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </header>

    <nav class="subnav">
      <div class="container d-flex flex-wrap gap-2 py-2">
        <a class="chip" href="dashboard.html">Resumen</a>
        <a class="chip" href="expenses.html">Cargar gastos</a>
        <a class="chip" href="stats.html">Estadísticas</a>
        <a class="chip active" href="profile.html">Perfil</a>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <div class="row g-3">
        <div class="col-lg-4">
          <div class="panel-card h-100">
            <h5 class="mb-3">Resumen</h5>
            <div class="profile-line"><span>Nombre</span><strong id="profileName">-</strong></div>
            <div class="profile-line"><span>Email</span><strong id="profileEmail">-</strong></div>
            <div class="profile-line"><span>Rol</span><strong id="profileRole">-</strong></div>
            <div class="profile-line"><span>Estado</span><strong id="profileStatus">-</strong></div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="panel-card">
            <h5 class="mb-3">Editar preferencias</h5>
            <form id="profileForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre completo</label>
                <input class="form-control form-control-modern" name="fullName" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Idioma</label>
                <select class="form-select form-control-modern" name="language"><option value="es">Español</option><option value="en">English</option></select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Moneda preferida</label>
                <select class="form-select form-control-modern" name="preferredCurrency"><option value="ARS">ARS</option><option value="USD">USD</option><option value="EUR">EUR</option></select>
              </div>
              <div class="col-12 d-flex gap-2">
                <button class="btn btn-neto" type="submit">Guardar cambios</button>
                <a class="btn btn-outline-secondary" href="dashboard.html">Volver al resumen</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
