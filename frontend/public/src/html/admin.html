<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin | NETO</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="sc-role-page">
    <header class="sc-topbar">
      <div class="sc-container sc-topbar-inner">
        <div>
          <p class="sc-title-eyebrow">Administración</p>
          <h1 class="sc-title">Panel Administrador</h1>
        </div>
        <div class="sc-actions">
          <button class="sc-button destructive" type="button" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </header>

    <main class="sc-page-main">
      <div class="sc-container">
      <section class="sc-card">
        <header class="sc-card-header">
          <h2 class="sc-card-title">Gestión de usuarios</h2>
          <p class="sc-card-description">Administra roles y activación de cuentas del sistema.</p>
        </header>
        <div class="sc-card-content">
        <div class="sc-table-wrap">
          <table class="sc-table">
            <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th></tr></thead>
            <tbody id="adminUsersBody"></tbody>
          </table>
        </div>
        </div>
      </section>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
  </body>
</html>
