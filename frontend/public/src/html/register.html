<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell d-flex align-items-center" style="min-height: 100vh">
    <main class="container">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
          <div class="panel-card fade-in-up">
            <h1 class="h3 mb-2">Crear cuenta</h1>
            <p class="text-secondary mb-3">Empezá a controlar tus gastos hoy.</p>
            <form id="registerForm" class="d-grid gap-2">
              <input class="form-control form-control-modern" name="fullName" placeholder="Nombre completo" required />
              <input class="form-control form-control-modern" type="email" name="email" placeholder="Email" required />
              <input class="form-control form-control-modern" type="password" name="password" placeholder="Contraseña" required />
              <select class="form-select form-control-modern" name="role">
                <option value="USER">Usuario</option>
                <option value="ADVISOR">Asesor</option>
              </select>
              <button class="btn btn-neto" type="submit">Registrarme</button>
            </form>
            <div class="mt-3 text-center small"><a href="login.html">Ya tengo cuenta</a></div>
          </div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
