<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="d-flex align-items-center" style="min-height: 100vh">
    <main class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="feature-card">
            <h2>Crear cuenta</h2>
            <form id="registerForm" class="mt-3">
              <div class="mb-2"><input class="form-control" name="fullName" placeholder="Nombre completo" required /></div>
              <div class="mb-2"><input class="form-control" type="email" name="email" placeholder="Email" required /></div>
              <div class="mb-2"><input class="form-control" type="password" name="password" placeholder="Contraseña" required /></div>
              <div class="mb-3">
                <select class="form-select" name="role">
                  <option value="USER">Usuario</option>
                  <option value="ADVISOR">Asesor</option>
                </select>
              </div>
              <button class="btn btn-neto w-100">Registrarme</button>
            </form>
            <div class="mt-3 text-center"><a href="login.html">Ya tengo cuenta</a></div>
          </div>
        </div>
      </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
