<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro | NETO</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="sc-expenses-page">
    <main class="sc-auth-shell">
      <div class="sc-card sc-auth-card">
        <header class="sc-card-header">
          <h1 class="sc-card-title">Crear cuenta</h1>
          <p class="sc-card-description">Regístrate para comenzar a controlar tus gastos con NETO.</p>
        </header>
        <div class="sc-card-content">
            <form id="registerForm" class="sc-field-group">
              <div class="sc-field"><input class="sc-input" name="fullName" placeholder="Nombre completo" required /></div>
              <div class="sc-field"><input class="sc-input" type="email" name="email" placeholder="Email" required /></div>
              <div class="sc-field"><input class="sc-input" type="password" name="password" placeholder="Contraseña" required /></div>
              <div class="sc-field">
                <select class="sc-select" name="role">
                  <option value="USER">Usuario</option>
                  <option value="ADVISOR">Asesor</option>
                </select>
              </div>
              <button class="sc-button primary w-100" type="submit">Registrarme</button>
            </form>
            <div class="mt-3 text-center"><a href="login.html">Ya tengo cuenta</a></div>
        </div>
        </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
