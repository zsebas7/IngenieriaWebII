<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell">
    <main class="container py-5">
      <section class="hero-panel mb-4 fade-in-up">
        <p class="eyebrow">Preview</p>
        <h1 class="h2 mb-2">Demo publica de NETO</h1>
        <p class="text-secondary mb-0">Mira el estilo visual y tipo de insights que recibes en segundos.</p>
      </section>

      <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="metric-card"><small>Gasto total marzo</small><div class="kpi">ARS 312.450</div></div></div>
        <div class="col-md-4"><div class="metric-card"><small>Categoría top</small><div class="kpi">Supermercado</div></div></div>
        <div class="col-md-4"><div class="metric-card"><small>Variación</small><div class="kpi text-danger">+8.2%</div></div></div>
      </div>

      <section class="panel-card mb-4">
        <img
          src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&w=1400&q=80"
          class="img-fluid rounded-4"
          alt="Equipo revisando metricas"
          loading="lazy"
        />
      </section>

      <div class="d-flex gap-2 flex-wrap">
        <a href="register.html" class="btn btn-neto">Crear cuenta</a>
        <a href="login.html" class="btn btn-outline-secondary">Ingresar</a>
        <a href="index.html" class="btn btn-ghost">Volver a landing</a>
      </div>
    </main>
  </body>
</html>
