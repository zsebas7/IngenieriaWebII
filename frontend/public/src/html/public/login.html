<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="app-shell">
    <main class="auth-wrap">
      <div class="container">
        <div class="auth-card row g-0">
          <div class="col-lg-5 d-none d-lg-block">
            <section class="auth-side h-100 d-flex flex-column">
              <div class="auth-side-top">
                <a class="brand-lockup text-white" href="../public/index.html">
                  <span class="logo-mark" aria-hidden="true"></span>
                  <span>NETO</span>
                </a>
                <h2 class="auth-welcome-title mt-4 mb-0">¡Bienvenido!</h2>
              </div>

              <div class="auth-brand-hero" aria-hidden="true">
                <span class="logo-mark logo-mark-hero"></span>
                <p class="auth-brand-word mb-0">NETO</p>
              </div>

              <p class="auth-side-tagline">Toma decisiones con una vista clara de tus movimientos y metas.</p>

              <ul class="auth-side-list">
                <li>Resumen mensual claro</li>
                <li>Deteccion de tickets con IA</li>
                <li>Consejos personalizados para ahorrar</li>
              </ul>
            </section>
          </div>
          <div class="col-lg-7">
            <section class="p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0" id="authTitle">Iniciar sesión</h1>
              </div>
              <div class="btn-group w-100 mb-3" role="group" aria-label="Seleccionar modo de acceso">
                <button class="btn btn-neto" id="authModeLogin" type="button">Iniciar sesión</button>
                <button class="btn btn-outline-secondary" id="authModeRegister" type="button">Crear cuenta</button>
              </div>
              <p class="text-secondary mb-4" id="authIntro">Accede a tu panel financiero para continuar.</p>
              <form id="loginForm" class="d-grid gap-3">
                <div>
                  <label class="form-label">Email</label>
                  <input class="form-control form-control-modern" type="email" name="email" placeholder="tu@email.com" required />
                </div>
                <div>
                  <label class="form-label">Contraseña</label>
                  <input class="form-control form-control-modern" type="password" name="password" placeholder="********" required />
                </div>
                <button class="btn btn-neto" type="submit">Ingresar</button>
              </form>

              <form id="registerForm" class="d-grid gap-3 d-none">
                <div>
                  <label class="form-label">Nombre completo</label>
                  <input class="form-control form-control-modern" name="fullName" placeholder="Ej: Ana Perez" required />
                </div>
                <div>
                  <label class="form-label">Email</label>
                  <input class="form-control form-control-modern" type="email" name="email" placeholder="tu@email.com" required />
                </div>
                <div>
                  <label class="form-label">Contraseña</label>
                  <input class="form-control form-control-modern" type="password" name="password" placeholder="Minimo 8 caracteres" required />
                </div>
                <div>
                  <label class="form-label">Tipo de cuenta</label>
                  <select class="form-select form-control-modern" name="role">
                    <option value="USER">Usuario</option>
                    <option value="ADVISOR">Asesor</option>
                  </select>
                </div>
                <button class="btn btn-neto" type="submit">Registrarme</button>
              </form>
              <div class="d-flex justify-content-between mt-4 small">
                <a class="text-link" id="authSwitchLink" href="../public/login.html?mode=register">Crear cuenta</a>
                <a class="text-link" id="forgotPasswordLink" href="../public/forgot-password.html">Olvidé mi contraseña</a>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/shared/dom.js"></script>
    <script src="/js/shared/icons.js"></script>
    <script src="/js/shared/format.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
