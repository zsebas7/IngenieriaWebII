<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="app-shell">
    <main class="auth-wrap">
      <div class="container">
        <div class="auth-card row g-0">
          <div class="col-lg-5 d-none d-lg-block">
            <section class="auth-side h-100 d-flex flex-column justify-content-between">
              <div>
                <a class="brand-lockup text-white" href="../public/index.html">
                  <span class="logo-mark" aria-hidden="true"></span>
                  <span>NETO</span>
                </a>
                <h2 class="mt-4">Empieza con control real</h2>
                <p class="mb-0">Crea tu cuenta en minutos y ordena tus finanzas desde hoy.</p>
              </div>
              <ul>
                <li>Sincroniza metas y presupuestos</li>
                <li>Seguimiento por categoría</li>
                <li>Modo oscuro y claro</li>
              </ul>
            </section>
          </div>
          <div class="col-lg-7">
            <section class="p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">Crear cuenta</h1>
              </div>
              <form id="registerForm" class="d-grid gap-3">
                <div>
                  <label class="form-label">Nombre completo</label>
                  <input class="form-control form-control-modern" name="fullName" placeholder="Ej: Ana Perez" required />
                </div>
                <div>
                  <label class="form-label">Email</label>
                  <input class="form-control form-control-modern" type="email" name="email" placeholder="tu@email.com" required />
                </div>
                <div>
                  <label class="form-label">Contraseña</label>
                  <input class="form-control form-control-modern" type="password" name="password" placeholder="Minimo 8 caracteres" required />
                </div>
                <div>
                  <label class="form-label">Tipo de cuenta</label>
                  <select class="form-select form-control-modern" name="role">
                    <option value="USER">Usuario</option>
                    <option value="ADVISOR">Asesor</option>
                  </select>
                </div>
                <button class="btn btn-neto" type="submit">Registrarme</button>
              </form>
              <div class="mt-4 small"><a class="text-link" href="../public/login.html">Ya tengo cuenta</a></div>
            </section>
          </div>
        </div>
      </div>
    </main>
    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/shared/dom.js"></script>
    <script src="/js/shared/icons.js"></script>
    <script src="/js/shared/format.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/register.js"></script>
  </body>
</html>
