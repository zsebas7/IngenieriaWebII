<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar bg-white border-bottom">
      <div class="container d-flex justify-content-between">
        <span class="navbar-brand text-success">NETO</span>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-dark btn-sm" onclick="toggleTheme()">Tema</button>
          <button class="btn btn-outline-danger btn-sm" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
        <h2>Hola, <span id="welcomeName"></span></h2>
        <div class="d-flex gap-2">
          <input class="form-control" id="monthInput" type="month" />
          <button class="btn btn-neto" id="reloadDashboard">Actualizar</button>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="dashboard-card"><small>Total mes</small><div class="kpi" id="kpiTotal">-</div></div></div>
        <div class="col-md-3"><div class="dashboard-card"><small>Promedio</small><div class="kpi" id="kpiAverage">-</div></div></div>
        <div class="col-md-3"><div class="dashboard-card"><small>Top categoría</small><div class="kpi" id="kpiCategory">-</div></div></div>
        <div class="col-md-3"><div class="dashboard-card"><small>Variación</small><div class="kpi" id="kpiVariation">-</div></div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-6"><div class="dashboard-card"><canvas id="categoryChart"></canvas></div></div>
        <div class="col-lg-6"><div class="dashboard-card"><h5>Presupuestos</h5><div id="budgetProgress"></div></div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-6">
          <div class="dashboard-card">
            <h5>Agregar gasto manual</h5>
            <form id="expenseForm" class="row g-2">
              <div class="col-6"><input class="form-control" name="merchant" placeholder="Comercio" required /></div>
              <div class="col-6"><input class="form-control" type="date" name="expenseDate" required /></div>
              <div class="col-4"><input class="form-control" type="number" step="0.01" name="originalAmount" placeholder="Monto" required /></div>
              <div class="col-4"><select class="form-select" name="currency"><option>ARS</option><option>USD</option><option>EUR</option></select></div>
              <div class="col-4"><input class="form-control" name="category" placeholder="Categoría" required /></div>
              <div class="col-12"><input class="form-control" name="description" placeholder="Descripción" /></div>
              <div class="col-12"><button class="btn btn-neto">Guardar gasto</button></div>
            </form>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="dashboard-card">
            <h5>Cargar ticket OCR</h5>
            <form id="ticketForm" class="row g-2">
              <div class="col-12"><input id="ticketFile" class="form-control" type="file" accept=".jpg,.jpeg,.png,.pdf" required /></div>
              <div class="col-12"><button class="btn btn-outline-success">Procesar ticket</button></div>
            </form>

            <hr />
            <h5>Presupuesto mensual</h5>
            <form id="budgetForm" class="row g-2">
              <div class="col-4"><input class="form-control" name="budgetCategory" placeholder="Categoría" required /></div>
              <div class="col-4"><input class="form-control" name="budgetAmount" type="number" step="0.01" placeholder="Monto" required /></div>
              <div class="col-4"><select class="form-select" name="budgetCurrency"><option>ARS</option><option>USD</option><option>EUR</option></select></div>
              <div class="col-12"><input class="form-control" name="budgetMonth" type="month" required /></div>
              <div class="col-12"><button class="btn btn-outline-success">Guardar presupuesto</button></div>
            </form>

            <hr />
            <h5>Meta de ahorro</h5>
            <form id="goalForm" class="row g-2">
              <div class="col-6"><input class="form-control" name="goalTitle" placeholder="Meta" required /></div>
              <div class="col-3"><input class="form-control" name="goalAmount" type="number" step="0.01" required /></div>
              <div class="col-3"><select class="form-select" name="goalCurrency"><option>ARS</option><option>USD</option><option>EUR</option></select></div>
              <div class="col-12"><input class="form-control" name="goalDeadline" type="date" required /></div>
              <div class="col-12"><button class="btn btn-outline-success">Guardar meta</button></div>
            </form>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-7">
          <div class="dashboard-card">
            <h5>Historial de gastos</h5>
            <div class="table-responsive">
              <table class="table table-sm">
                <thead><tr><th>Fecha</th><th>Comercio</th><th>Categoría</th><th>Original</th><th>ARS</th></tr></thead>
                <tbody id="expensesBody"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="dashboard-card">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="mb-0">Recomendaciones</h5>
              <button class="btn btn-sm btn-neto" id="generateRecommendation">Generar</button>
            </div>
            <div id="recommendations"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
