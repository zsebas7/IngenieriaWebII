<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <div class="d-flex align-items-center gap-2 mb-1">
            <span class="logo-mark" aria-hidden="true" style="width: 28px; height: 28px"></span>
            <p class="eyebrow mb-0">Panel principal</p>
          </div>
          <h1 class="h3 mb-0">Resumen financiero</h1>
        </div>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <input class="form-control form-control-modern" id="monthInput" type="month" />
          <button class="btn btn-neto" id="reloadDashboard">Actualizar</button>
          <button class="btn btn-ghost" onclick="toggleTheme()">Tema</button>
          <button class="btn btn-outline-danger" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </header>

    <nav class="subnav">
      <div class="container d-flex flex-wrap gap-2 py-2">
        <a class="chip active" href="dashboard.html">Resumen</a>
        <a class="chip" href="expenses.html">Movimientos</a>
        <a class="chip" href="stats.html">Estadisticas</a>
        <a class="chip" href="profile.html">Perfil</a>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <section class="hero-panel mb-4 fade-in-up">
        <div class="d-flex flex-wrap justify-content-between align-items-end gap-3">
          <div>
            <p class="text-secondary mb-1">Bienvenido</p>
            <h2 class="mb-0">Hola, <span id="welcomeName"></span></h2>
          </div>
          <button class="btn btn-neto" id="generateRecommendation">Generar recomendacion</button>
        </div>
      </section>

      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Total del mes</small><div class="kpi" id="kpiTotal">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Promedio</small><div class="kpi" id="kpiAverage">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Top categoria</small><div class="kpi" id="kpiCategory">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Variacion</small><div class="kpi" id="kpiVariation">-</div></div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-7">
          <section class="panel-card h-100">
            <div class="section-title mb-3">
              <h5 class="mb-0">Distribucion por categoria</h5>
              <a class="text-link" href="stats.html">Ver analisis</a>
            </div>
            <div class="chart-wrap"><canvas id="categoryChart"></canvas></div>
          </section>
        </div>
        <div class="col-lg-5">
          <section class="panel-card h-100">
            <h5 class="mb-3">Presupuestos activos</h5>
            <div id="budgetProgress"></div>
          </section>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-lg-7">
          <section class="panel-card h-100">
            <div class="section-title mb-3">
              <h5 class="mb-0">Ultimos gastos</h5>
              <a class="text-link" href="expenses.html">Gestionar</a>
            </div>
            <div class="table-responsive">
              <table class="table table-modern align-middle">
                <thead><tr><th>Fecha</th><th>Comercio</th><th>Categoria</th><th>Original</th><th>ARS</th></tr></thead>
                <tbody id="expensesBody"></tbody>
              </table>
            </div>
          </section>
        </div>
        <div class="col-lg-5">
          <section class="panel-card h-100">
            <h5 class="mb-3">Recomendaciones</h5>
            <div id="recommendations"></div>
          </section>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
