<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gastos | NETO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell">
    <header class="topbar">
      <div class="container py-3 d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <p class="eyebrow mb-1">Gestión de gastos</p>
          <h1 class="h4 mb-0">Cargar y organizar movimientos</h1>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-ghost btn-sm" onclick="toggleTheme()">Tema</button>
          <button class="btn btn-outline-danger btn-sm" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </header>

    <nav class="subnav">
      <div class="container d-flex flex-wrap gap-2 py-2">
        <a class="chip" href="dashboard.html">Resumen</a>
        <a class="chip active" href="expenses.html">Cargar gastos</a>
        <a class="chip" href="stats.html">Estadísticas</a>
        <a class="chip" href="profile.html">Perfil</a>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <div class="row g-3 mb-4">
        <div class="col-lg-6">
          <div class="panel-card h-100">
            <h5 class="mb-3">Carga manual</h5>
            <form id="expenseForm" class="row g-2">
              <div class="col-sm-6"><input class="form-control form-control-modern" name="merchant" placeholder="Comercio" required /></div>
              <div class="col-sm-6"><input class="form-control form-control-modern" type="date" name="expenseDate" required /></div>
              <div class="col-sm-4"><input class="form-control form-control-modern" type="number" step="0.01" name="originalAmount" placeholder="Monto" required /></div>
              <div class="col-sm-4"><select class="form-select form-control-modern" name="currency"><option>ARS</option><option>USD</option><option>EUR</option></select></div>
              <div class="col-sm-4"><input class="form-control form-control-modern" name="category" placeholder="Categoría" required /></div>
              <div class="col-12"><input class="form-control form-control-modern" name="description" placeholder="Descripción" /></div>
              <div class="col-12"><button class="btn btn-neto">Guardar gasto</button></div>
            </form>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="panel-card h-100">
            <h5 class="mb-3">Carga por ticket (OCR)</h5>
            <form id="ticketForm" class="row g-2">
              <div class="col-12"><input id="ticketFile" class="form-control form-control-modern" type="file" accept=".jpg,.jpeg,.png,.pdf" required /></div>
              <div class="col-12"><button class="btn btn-outline-success">Procesar ticket</button></div>
            </form>
            <p class="text-secondary small mt-3 mb-0">Se procesa automáticamente y crea el gasto en tu cuenta.</p>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-6">
          <div class="panel-card h-100">
            <h5 class="mb-3">Presupuesto mensual</h5>
            <form id="budgetForm" class="row g-2">
              <div class="col-sm-4"><input class="form-control form-control-modern" name="budgetCategory" placeholder="Categoría" required /></div>
              <div class="col-sm-4"><input class="form-control form-control-modern" name="budgetAmount" type="number" step="0.01" placeholder="Monto" required /></div>
              <div class="col-sm-4"><select class="form-select form-control-modern" name="budgetCurrency"><option>ARS</option><option>USD</option><option>EUR</option></select></div>
              <div class="col-12"><input class="form-control form-control-modern" name="budgetMonth" type="month" required /></div>
              <div class="col-12"><button class="btn btn-outline-success">Guardar presupuesto</button></div>
            </form>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="panel-card h-100">
            <h5 class="mb-3">Meta de ahorro</h5>
            <form id="goalForm" class="row g-2">
              <div class="col-sm-6"><input class="form-control form-control-modern" name="goalTitle" placeholder="Meta" required /></div>
              <div class="col-sm-3"><input class="form-control form-control-modern" name="goalAmount" type="number" step="0.01" required /></div>
              <div class="col-sm-3"><select class="form-select form-control-modern" name="goalCurrency"><option>ARS</option><option>USD</option><option>EUR</option></select></div>
              <div class="col-12"><input class="form-control form-control-modern" name="goalDeadline" type="date" required /></div>
              <div class="col-12"><button class="btn btn-outline-success">Guardar meta</button></div>
            </form>
          </div>
        </div>
      </div>

      <section class="panel-card">
        <h5 class="mb-3">Historial de gastos</h5>
        <div class="table-responsive">
          <table class="table table-modern align-middle">
            <thead>
              <tr><th>Fecha</th><th>Comercio</th><th>Categoría</th><th>Original</th><th>ARS</th><th>Fuente</th></tr>
            </thead>
            <tbody id="expensesBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/expenses.js"></script>
  </body>
</html>
