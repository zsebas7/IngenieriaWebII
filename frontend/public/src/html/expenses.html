<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carga Manual | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell with-sidebar">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <p class="eyebrow mb-1">Centro de gastos</p>
          <h1 class="h3 mb-0">Carga manual de gastos</h1>
        </div>
      </div>
    </header>

    <nav class="subnav" data-component="sidebar"></nav>

    <main class="container py-4 py-lg-5 page-main-with-footer-link">
      <section class="panel-card expense-form-card">
        <h5 class="mb-1">Registrar gasto manual</h5>
        <p class="text-secondary small mb-3">Completá los datos para guardar un gasto de manera manual.</p>
        <form id="manualExpenseForm" class="expense-create-form row g-3">
              <div class="col-md-7">
                <label class="form-label">Comercio</label>
                <input class="form-control form-control-modern" name="merchant" placeholder="Ej: Supermercado Central" required />
              </div>
              <div class="col-md-5">
                <label class="form-label">Fecha</label>
                <div class="input-group calendar-input-group">
                  <input id="manualExpenseDateInput" class="form-control form-control-modern" type="text" name="expenseDate" placeholder="dd/mm/aaaa" pattern="\d{2}/\d{2}/\d{4}" inputmode="numeric" maxlength="10" data-date-mask="ddmmyyyy" required />
                  <input id="manualExpenseDatePicker" class="calendar-hidden-input" type="date" tabindex="-1" aria-hidden="true" />
                  <button class="btn btn-outline-secondary date-picker-trigger" type="button" data-target="manualExpenseDatePicker" data-sync="manualExpenseDateInput" aria-label="Abrir calendario para fecha de gasto" title="Abrir calendario">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                      <line x1="16" y1="2" x2="16" y2="6"></line>
                      <line x1="8" y1="2" x2="8" y2="6"></line>
                      <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Monto</label>
                <input class="form-control form-control-modern no-spinner" type="number" step="0.01" name="originalAmount" placeholder="0.00" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Moneda</label>
                <select class="form-select form-control-modern" name="currency"><option>ARS</option><option>USD</option><option>EUR</option></select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Categoría</label>
                <select class="form-select form-control-modern" name="category" required>
                  <option value="">Seleccionar</option>
                  <option>Alimentos</option>
                  <option>Entretenimiento</option>
                  <option>Transporte</option>
                  <option>Salud</option>
                  <option>Educación</option>
                  <option>Servicios</option>
                  <option>Hogar</option>
                  <option>Otros</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Descripción (opcional)</label>
                <input class="form-control form-control-modern" name="description" placeholder="Detalle adicional del gasto" />
              </div>
              <div class="col-12 d-flex justify-content-end gap-2 expense-form-actions">
                <button class="btn btn-neto expense-submit-btn" type="submit">Guardar gasto manual</button>
              </div>
        </form>
      </section>

      <p class="flow-redirect-note mt-3 mb-0">
        ¿Prefieres cargar el gasto con ticket?
        <a href="expenses-upload.html">Subir ticket</a>
        <span class="mx-1">·</span>
        <a href="expenses-organize.html">Organizar gastos</a>
      </p>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/expenses-helpers.js"></script>
    <script src="../js/expenses-manual.js"></script>
  </body>
</html>
