<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="app-shell with-sidebar">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <div class="d-flex align-items-center gap-2 mb-1">
            <span class="logo-mark" aria-hidden="true" style="width: 28px; height: 28px"></span>
            <p class="eyebrow mb-0">Panel principal</p>
          </div>
          <h1 class="h3 mb-0">Resumen financiero</h1>
        </div>
        <div class="period-picker-wrap">
          <button class="period-chip" id="monthChip" type="button" aria-label="Seleccionar período">-</button>
          <input class="form-control form-control-modern period-month-input" id="monthInput" type="month" aria-label="Seleccionar mes" />
          <div class="period-popover" id="monthPopover" hidden>
            <div class="period-popover-grid">
              <div>
                <label class="form-label mb-1" for="monthSelect">Mes</label>
                <select class="form-select form-control-modern" id="monthSelect" aria-label="Mes">
                  <option value="01">Enero</option>
                  <option value="02">Febrero</option>
                  <option value="03">Marzo</option>
                  <option value="04">Abril</option>
                  <option value="05">Mayo</option>
                  <option value="06">Junio</option>
                  <option value="07">Julio</option>
                  <option value="08">Agosto</option>
                  <option value="09">Septiembre</option>
                  <option value="10">Octubre</option>
                  <option value="11">Noviembre</option>
                  <option value="12">Diciembre</option>
                </select>
              </div>
              <div>
                <label class="form-label mb-1" for="yearSelect">Año</label>
                <select class="form-select form-control-modern" id="yearSelect" aria-label="Año"></select>
              </div>
            </div>
            <div class="period-popover-actions">
              <button class="btn btn-outline-secondary" id="cancelMonthBtn" type="button">Cancelar</button>
              <button class="btn btn-neto" id="applyMonthBtn" type="button">Aplicar</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <nav class="subnav" data-component="sidebar"></nav>

    <main class="container py-4 py-lg-5">
      <section class="hero-panel mb-4 fade-in-up">
        <div class="d-flex flex-wrap justify-content-between align-items-end gap-3">
          <div>
            <p class="text-secondary mb-1">Bienvenido</p>
            <h2 class="mb-0">Hola, <span id="welcomeName"></span></h2>
          </div>
        </div>
      </section>

      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-4"><div class="metric-card"><small>Total del mes</small><div class="kpi" id="kpiTotal">-</div></div></div>
        <div class="col-sm-6 col-xl-4"><div class="metric-card"><small>Promedio</small><div class="kpi" id="kpiAverage">-</div></div></div>
        <div class="col-sm-6 col-xl-4"><div class="metric-card"><small>Top categoría</small><div class="kpi" id="kpiCategory">-</div></div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-8">
          <section class="panel-card h-100">
            <div class="section-title mb-3">
              <h5 class="mb-0">Distribución por categoría</h5>
              <a class="text-link" href="../user/stats.html">Ver análisis</a>
            </div>
            <div class="chart-wrap dashboard-chart-wrap"><canvas id="categoryChart"></canvas></div>
          </section>
        </div>
        <div class="col-lg-4">
          <section class="panel-card h-100">
            <div class="section-title mb-3">
              <h5 class="mb-0">Recomendaciones de tu asesor</h5>
            </div>
            <div id="recommendations"></div>
          </section>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-6">
          <section class="panel-card h-100">
            <div class="summary-block-head mb-3">
              <h5 class="mb-0">Presupuestos activos</h5>
              <a class="text-link small" href="../user/planning.html">Ver todos</a>
            </div>
            <div id="budgetProgress"></div>
          </section>
        </div>
        <div class="col-lg-6">
          <section class="panel-card h-100">
            <div class="summary-block-head mb-3">
              <h5 class="mb-0">Metas activas</h5>
              <a class="text-link small" href="../user/goals.html">Ver todas</a>
            </div>
            <div id="goalProgress"></div>
          </section>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12">
          <section class="panel-card h-100">
            <div class="section-title mb-3">
              <h5 class="mb-0">Últimos gastos</h5>
              <a class="text-link" href="../user/expenses.html">Gestiónar</a>
            </div>
            <div class="table-responsive">
              <table class="table table-modern align-middle">
                <thead><tr><th>Fecha</th><th>Comercio</th><th>Categoría</th><th>Original</th><th>ARS</th></tr></thead>
                <tbody id="expensesBody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/shared/dom.js"></script>
    <script src="/js/shared/icons.js"></script>
    <script src="/js/shared/format.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/shared/month-picker.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
