<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="app-shell with-sidebar">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <p class="eyebrow mb-1">Cuenta</p>
          <h1 class="h3 mb-0">Perfil y preferencias</h1>
        </div>
      </div>
    </header>

    <nav class="subnav" data-component="sidebar"></nav>

    <main class="container py-4 py-lg-5">
      <div class="row g-3">
        <div class="col-lg-4">
          <section class="panel-card h-100">
            <h5 class="mb-3">Resumen de cuenta</h5>
            <div class="profile-line"><span>Nombre</span><strong id="profileName">-</strong></div>
            <div class="profile-line"><span>Email</span><strong id="profileEmail">-</strong></div>
            <div class="profile-line"><span>Rol</span><strong id="profileRole">-</strong></div>
            <div class="profile-line"><span>Estado</span><strong id="profileStatus">-</strong></div>
          </section>
        </div>
        <div class="col-lg-8">
          <section class="panel-card h-100">
            <h5 class="mb-3">Editar preferencias</h5>
            <form id="profileForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre completo</label>
                <input class="form-control form-control-modern" name="fullName" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Idioma</label>
                <select class="form-select form-control-modern" name="language"><option value="es">Español</option><option value="en">English</option></select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Moneda preferida</label>
                <select class="form-select form-control-modern" name="preferredCurrency"><option value="ARS">ARS</option><option value="USD">USD</option><option value="EUR">EUR</option></select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Tema de la aplicación</label>
                <select class="form-select form-control-modern" name="themePreference" id="themePreference">
                  <option value="light">Modo claro</option>
                  <option value="dark">Modo oscuro</option>
                </select>
              </div>
              <div class="col-12 d-flex gap-2 flex-wrap">
                <button class="btn btn-neto" type="submit">Guardar cambios</button>
                <a class="btn btn-outline-secondary" href="../user/dashboard.html">Volver al resumen</a>
              </div>
            </form>

            <hr class="my-4" />

            <h5 class="mb-3">Seguridad</h5>
            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-neto" id="openPasswordModal" type="button" data-bs-toggle="modal" data-bs-target="#changePasswordModal">Cambiar contraseña</button>
              <button class="btn btn-outline-danger" id="logoutFromProfile" type="button">Cerrar sesión</button>
            </div>
          </section>
        </div>
      </div>
    </main>

    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content panel-card">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title">Cambiar contraseña</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body pt-2">
            <form id="passwordForm" class="row g-3">
              <div class="col-12">
                <label class="form-label">Contraseña actual</label>
                <input class="form-control form-control-modern" name="currentPassword" type="password" required />
              </div>
              <div class="col-12">
                <label class="form-label">Nueva contraseña</label>
                <input class="form-control form-control-modern" name="newPassword" type="password" minlength="8" required />
              </div>
              <div class="col-12">
                <label class="form-label">Confirmar nueva contraseña</label>
                <input class="form-control form-control-modern" name="confirmPassword" type="password" minlength="8" required />
              </div>
              <div class="col-12 d-flex justify-content-end gap-2">
                <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-neto" type="submit">Guardar nueva contraseña</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/shared/dom.js"></script>
    <script src="/js/shared/icons.js"></script>
    <script src="/js/shared/format.js"></script>
    <script src="/js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/profile.js"></script>
  </body>
</html>
