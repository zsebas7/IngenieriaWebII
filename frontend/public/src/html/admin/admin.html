<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="app-shell">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <p class="eyebrow mb-1">Administración</p>
          <h1 class="h3 mb-0">Gestión de usuarios</h1>
        </div>
      </div>
    </header>

    <main class="container py-4 py-lg-5">
      <section class="panel-card fade-in-up">
        <div class="section-title mb-3">
          <h5 class="mb-0">Usuarios registrados</h5>
          <span class="text-secondary small">Gestión de roles y estado</span>
        </div>
        <div class="table-responsive">
          <table class="table table-modern align-middle">
            <thead>
              <tr><th>Nombre</th><th>Email</th><th>Perfil</th><th>Rol</th><th>Estado</th></tr>
            </thead>
            <tbody id="adminUsersBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/shared/dom.js"></script>
    <script src="/js/shared/icons.js"></script>
    <script src="/js/shared/format.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
