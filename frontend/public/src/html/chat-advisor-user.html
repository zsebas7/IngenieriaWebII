<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat con Asesor | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell with-sidebar">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <p class="eyebrow mb-1">Chats</p>
          <h1 class="h3 mb-0">Chat con asesor</h1>
        </div>
      </div>
    </header>

    <nav class="subnav" data-component="sidebar"></nav>

    <main class="container py-4 py-lg-5">
      <section class="panel-card">
        <div class="section-title mb-3">
          <h5 class="mb-0">Conversaciones abiertas por asesores</h5>
          <span class="text-secondary">Selecciona un chat abierto y responde en tiempo real</span>
        </div>

        <div class="row g-3 ai-chat-layout">
          <div class="col-lg-4">
            <div class="panel-card h-100 ai-chat-sidebar">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0">Chats disponibles</h6>
              </div>
              <div id="userAdvisorConversationsList" class="planning-list ai-chat-sessions"></div>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="panel-card h-100 d-flex flex-column gap-3 ai-chat-panel">
              <div class="ai-chat-panel-head">
                <div>
                  <h6 class="mb-1">Conversación activa</h6>
                  <p id="userAdvisorChatTitle" class="mb-0 text-secondary small">Seleccione una conversación para comenzar</p>
                </div>
                <span id="userAdvisorChatStatus" class="status-chip warn">Sin conexión</span>
              </div>

              <div id="userAdvisorChatMessages" class="planning-list ai-chat-messages" aria-live="polite"></div>

              <form id="userAdvisorChatForm" class="d-flex gap-2 align-items-end">
                <div class="flex-grow-1">
                  <label class="form-label mb-1" for="userAdvisorChatInput">Mensaje</label>
                  <textarea
                    id="userAdvisorChatInput"
                    class="form-control form-control-modern"
                    rows="2"
                    maxlength="2000"
                    placeholder="Escribe tu mensaje al asesor..."
                  ></textarea>
                </div>
                <button id="userAdvisorChatSendBtn" class="btn btn-neto" type="submit">Enviar</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/chat-advisor-user.js"></script>
  </body>
</html>
