<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estadísticas | NETO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="sc-expenses-page">
    <header class="sc-topbar">
      <div class="sc-container sc-topbar-inner">
        <div>
          <p class="sc-title-eyebrow">Analítica avanzada</p>
          <h1 class="sc-title">Estadísticas detalladas</h1>
        </div>
        <div class="sc-actions">
          <input class="form-control form-control-modern" id="monthInput" type="month" />
          <button class="sc-button primary" id="reloadStats">Actualizar</button>
          <button class="sc-button secondary" type="button" onclick="toggleTheme()">Tema</button>
          <button class="sc-button destructive" type="button" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </header>

    <nav class="sc-tabs" aria-label="Secciones de usuario">
      <div class="sc-container sc-tabs-list">
        <a class="sc-tab" href="dashboard.html">Resumen</a>
        <a class="sc-tab" href="expenses.html">Cargar gastos</a>
        <a class="sc-tab" data-active="true" href="stats.html" aria-current="page">Estadísticas</a>
        <a class="sc-tab" href="profile.html">Perfil</a>
      </div>
    </nav>

    <main class="sc-main">
      <div class="sc-container">
      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Total ARS</small><div class="kpi" id="kpiTotal">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Promedio</small><div class="kpi" id="kpiAverage">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Transacciones</small><div class="kpi" id="kpiTransactions">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Top categoría</small><div class="kpi" id="kpiCategory">-</div></div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-6">
          <div class="sc-card">
            <div class="sc-card-content">
            <h5 class="mb-3">Distribución por categoría</h5>
            <div class="chart-wrap"><canvas id="categoryChart"></canvas></div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="sc-card">
            <div class="sc-card-content">
            <h5 class="mb-3">Gasto por día</h5>
            <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>
            </div>
          </div>
        </div>
      </div>

      <section class="sc-card">
        <div class="sc-card-content">
        <h5 class="mb-3">Detalle por categoría</h5>
        <div id="categoryBreakdown"></div>
        </div>
      </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/stats.js"></script>
  </body>
</html>
