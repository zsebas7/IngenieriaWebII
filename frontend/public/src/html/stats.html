<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estadísticas | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell with-sidebar">
    <header class="topbar">
      <div class="container py-3 dashboard-header">
        <div>
          <p class="eyebrow mb-1">Analítica</p>
          <h1 class="h3 mb-0">Estadísticas detalladas</h1>
        </div>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <input class="form-control form-control-modern" id="monthInput" type="month" />
          <button class="btn btn-neto" id="reloadStats">Actualizar</button>
          <button class="btn btn-outline-danger" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </header>

    <nav class="subnav">
      <div class="container d-flex flex-wrap gap-2 py-2">
        <button id="navToggle" class="subnav-toggle" type="button" aria-expanded="false" aria-label="Mostrar u ocultar etiquetas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>
        <a class="chip" href="dashboard.html" data-label="Resumen" title="Resumen" aria-label="Resumen">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h8V3H3zM13 21h8V11h-8zM13 3h8v4h-8zM3 21h8v-6H3z"/></svg></span>
          <span class="chip-label">Resumen</span>
        </a>
        <a class="chip" href="expenses.html" data-label="Cargar Gastos" title="Cargar Gastos" aria-label="Cargar Gastos">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10"/></svg></span>
          <span class="chip-label">Cargar Gastos</span>
        </a>
        <a class="chip" href="planning.html" data-label="Planificación" title="Planificación" aria-label="Planificación">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4v4M16 4v4M4 10h16M6 20h12a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg></span>
          <span class="chip-label">Planificación</span>
        </a>
        <a class="chip active" href="stats.html" data-label="Estadísticas" title="Estadísticas" aria-label="Estadísticas">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19h16M7 16V8M12 16V5M17 16v-3"/></svg></span>
          <span class="chip-label">Estadísticas</span>
        </a>
        <a class="chip" href="profile.html" data-label="Perfil" title="Perfil" aria-label="Perfil">
          <span class="chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 1 0-16 0M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg></span>
          <span class="chip-label">Perfil</span>
        </a>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Total ARS</small><div class="kpi" id="kpiTotal">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Promedio</small><div class="kpi" id="kpiAverage">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Transacciones</small><div class="kpi" id="kpiTransactions">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Top categoría</small><div class="kpi" id="kpiCategory">-</div></div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-6"><section class="panel-card"><h5 class="mb-3">Distribución por categoría</h5><div class="chart-wrap"><canvas id="categoryChart"></canvas></div></section></div>
        <div class="col-lg-6"><section class="panel-card"><h5 class="mb-3">Gasto por día</h5><div class="chart-wrap"><canvas id="dailyChart"></canvas></div></section></div>
      </div>

      <section class="panel-card">
        <h5 class="mb-3">Detalle por categoría</h5>
        <div id="categoryBreakdown"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/stats.js"></script>
  </body>
</html>
