<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estadísticas | NETO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="app-shell">
    <header class="topbar">
      <div class="container py-3 d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <p class="eyebrow mb-1">Análisis</p>
          <h1 class="h4 mb-0">Estadísticas detalladas</h1>
        </div>
        <div class="d-flex gap-2">
          <input class="form-control form-control-modern" id="monthInput" type="month" />
          <button class="btn btn-neto" id="reloadStats">Actualizar</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleTheme()">Tema</button>
          <button class="btn btn-outline-danger btn-sm" onclick="NetoAuth.logout()">Salir</button>
        </div>
      </div>
    </header>

    <nav class="subnav">
      <div class="container d-flex flex-wrap gap-2 py-2">
        <a class="chip" href="dashboard.html">Resumen</a>
        <a class="chip" href="expenses.html">Cargar gastos</a>
        <a class="chip active" href="stats.html">Estadísticas</a>
        <a class="chip" href="profile.html">Perfil</a>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Total ARS</small><div class="kpi" id="kpiTotal">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Promedio</small><div class="kpi" id="kpiAverage">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Transacciones</small><div class="kpi" id="kpiTransactions">-</div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="metric-card"><small>Top categoría</small><div class="kpi" id="kpiCategory">-</div></div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-lg-6"><div class="panel-card"><h5 class="mb-3">Distribución por categoría</h5><div class="chart-wrap"><canvas id="categoryChart"></canvas></div></div></div>
        <div class="col-lg-6"><div class="panel-card"><h5 class="mb-3">Gasto por día</h5><div class="chart-wrap"><canvas id="dailyChart"></canvas></div></div></div>
      </div>

      <section class="panel-card">
        <h5 class="mb-3">Detalle por categoría</h5>
        <div id="categoryBreakdown"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/stats.js"></script>
  </body>
</html>
